# Book settings — https://jupyterbook.org/customize/config.html
title: Open Science Data Repository (OSDR) — Interactive FAIR Notebook
author: Richard Barker and the OSDR team
logo: GeneLab_logo2.png
copyright: "2026"

# Don't re-run notebooks during the build: use the outputs already saved in
# each .ipynb. This keeps CI fast and green (many notebooks hit the live OSDR
# API / large data files). Re-run notebooks locally to refresh their outputs.
execute:
  execute_notebooks: "off"

# A bibtex file so we can create citations
bibtex_bibfiles:
  - references.bib

# Extra notebooks/files kept in the repo but NOT part of the book (avoids orphan
# pages and stray links). The curated book is defined entirely by _toc.yml.
exclude_patterns:
  - CARA-phenotypes_DRB.ipynb
  - "IGV for OSDR development.ipynb"
  - "Methods DRB_V1.ipynb"
  - OSDR_metadata_notebok_for_ISSOP_figures.ipynb
  - notebook_v1.ipynb
  - Introduction.md
  - README.md
  - data_arabidopsis_microarray/*

# Where the book lives on the web (powers the edit / issue / repo buttons)
repository:
  url: https://github.com/dr-richard-barker/OSDR_juypter_book.io
  path_to_book: chapters
  branch: main

html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true

# Put a 🚀 "launch" menu on every notebook page so readers can run it live in
# the cloud (no install) via Binder or Google Colab, or execute cells in-page.
launch_buttons:
  notebook_interface: "jupyterlab"
  binderhub_url: "https://mybinder.org"
  colab_url: "https://colab.research.google.com"
  thebe: true

# Allow MyST features used in the notebooks / markdown
parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify

# Don't fail the whole build on a single notebook/cell error while we iterate
sphinx:
  config:
    nb_execution_allow_errors: true
    # The GitBook-exported reference chapters jump heading levels (H1 -> H3);
    # they render fine, so silence that cosmetic warning class.
    suppress_warnings:
      - myst.header
